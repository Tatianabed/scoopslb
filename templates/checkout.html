<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Scoops.lb</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar">

    <div class="logo">
        Scoops.lb
    </div>

    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/shop">Shop</a></li>
        <li><a href="/contact">Contact</a></li>
        <li><a href="/cart">Cart</a></li>
    </ul>

</nav>

<section class="checkout-page">

    <div class="checkout-container">

        <h1>Checkout</h1>

        <p class="checkout-text">
            Please fill in your delivery information.
        </p>

        <p><strong>Subtotal:</strong> ${{ total }}</p>
        <p><strong>Delivery Fee:</strong> ${{ delivery }}</p>
        <h2>Total: ${{ final_total }}</h2>

        <form method="POST">

            <label>
                Full Name <span class="required">*</span>
            </label>
            <input type="text" name="customer_name" required>

            <label>
                Phone Number <span class="required">*</span>
            </label>
            <input type="text" name="phone" required>

            <label>
                City <span class="required">*</span>
            </label>
            <input type="text" name="city" required>

            <label>
                Street Name <span class="required">*</span>
            </label>
            <input type="text" name="street_name" required>

            <label>
                Building / Apartment <span class="required">*</span>
            </label>
            <input type="text" name="building" required>

            <label>
                Floor Number <span class="required">*</span>
            </label>
            <input type="text" name="floor_number" required>

            <button type="submit" class="checkout-btn">
                Place Order
            </button>

        </form>

    </div>

</section>

<footer>
    <p>© 2026 Scoops.lb. All Rights Reserved.</p>
</footer>

</body>
</html>
