<form method="POST">

    <!-- Customer Information -->

    <label for="customer_name">
        Full Name <span class="required">*</span>
    </label>
    <input type="text" id="customer_name" name="customer_name" required>

    <label for="phone">
        Phone Number <span class="required">*</span>
    </label>
    <input type="text" id="phone" name="phone" required>

    <!-- Address Information -->

    <label for="city">
        City <span class="required">*</span>
    </label>
    <input type="text" id="city" name="city" required>

    <label for="street_name">
        Street Name <span class="required">*</span>
    </label>
    <input type="text" id="street_name" name="street_name" required>

    <label for="building">
        Apartment / Building <span class="required">*</span>
    </label>
    <input type="text" id="building" name="building" required>

    <label for="floor_number">
        Floor Number <span class="required">*</span>
    </label>
    <input type="text" id="floor_number" name="floor_number" required>

    <button type="submit" class="checkout-btn">
        Place Order
    </button>

</form>
