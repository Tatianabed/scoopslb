<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Product</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
    background:#f7f0ff;
    font-family:Arial,sans-serif;
}

.container{

    max-width:700px;
    margin:50px auto;

    background:white;

    padding:40px;

    border-radius:25px;

    box-shadow:0 5px 20px rgba(0,0,0,.12);

}

h1{

    text-align:center;
    color:#8a63d2;

    margin-bottom:30px;

}

label{

    display:block;
    margin-top:18px;
    font-weight:bold;
    color:#7b4bc4;

}

input,
textarea{

    width:100%;
    padding:14px;

    border:1px solid #ddd;

    border-radius:12px;

    margin-top:8px;

    margin-bottom:18px;

    font-size:16px;

}

textarea{

    height:140px;

    resize:none;

}

button{

    width:100%;

    padding:16px;

    border:none;

    border-radius:30px;

    background:linear-gradient(90deg,#ff92cf,#b587ff);

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

}

button:hover{

    opacity:.9;

}

.back{

    display:block;

    text-align:center;

    margin-top:20px;

    color:#8a63d2;

    text-decoration:none;

    font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h1>Edit Product</h1>

<form method="POST" enctype="multipart/form-data">

<label>Product Name</label>

<input
type="text"
name="name"
value="{{ product.name }}"
required>

<label>Description</label>

<textarea
name="description"
required>{{ product.description }}</textarea>

<label>Price ($)</label>

<input
type="number"
step="0.01"
name="price"
value="{{ product.price }}"
required>

<label>Stock</label>

<input
type="number"
name="stock"
value="{{ product.stock }}"
required>

<label>New Image (optional)</label>

<input
type="file"
name="image">

<button type="submit">

Save Changes

</button>

</form>

<a href="/dashboard" class="back">

← Back to Dashboard

</a>

</div>

</body>

</html>
